version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: sentinel-redis-prod
    restart: always
    volumes:
      - redis_data_prod:/data
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
    networks:
      - sentinel-network
    deploy:
      resources:
        limits:
          memory: 600M

  api:
    image: ${DOCKER_HUB_USERNAME}/sentinel-backend:latest
    container_name: sentinel-api-prod
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env.prod
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/1
      - APP_ENV=production
    volumes:
      - ./logs:/app/logs
    depends_on:
      - redis
    command: >
      gunicorn app.main:app
      --config gunicorn.conf.py
      --workers 4
      --worker-class uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8000
      --access-logfile -
      --error-logfile -
    networks:
      - sentinel-network
    deploy:
      resources:
        limits:
          memory: 1G

  worker:
    image: ${DOCKER_HUB_USERNAME}/sentinel-worker:latest
    container_name: sentinel-worker-prod
    restart: always
    env_file:
      - .env.prod
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/1
    volumes:
      - ./logs:/app/logs
    depends_on:
      - redis
    networks:
      - sentinel-network
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G

volumes:
  redis_data_prod:

networks:
  sentinel-network:
    driver: bridge